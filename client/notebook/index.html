<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroLex - Sổ tay</title>
  <link rel="stylesheet" href="../style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <div class="wrapper">
    <header class="floating-nav">
      <a class="brand" href="../index.html">NeuroLex</a>

      <nav class="menu" aria-label="Menu chính">
        <a href="../index.html">Trang chủ</a>
        <a href="./index.html" class="active">Sổ tay</a>
        <span class="divider" aria-hidden="true"></span>
        <button id="settings-btn" class="icon-btn" type="button" aria-label="Cài đặt">
          <i class="fa-solid fa-gear" aria-hidden="true"></i>
        </button>
        <div id="auth-guest-actions" class="auth-actions">
          <button id="open-login-btn" class="btn-outline" type="button">Đăng nhập</button>
          <button id="open-register-btn" class="btn-primary" type="button">Đăng ký</button>
        </div>
        <div id="auth-user-actions" class="auth-actions hidden">
          <button id="profile-btn" class="btn-outline" type="button" aria-label="Thông tin cá nhân"></button>
          <button id="logout-btn" class="btn-outline" type="button">Đăng xuất</button>
        </div>
      </nav>
    </header>

    <main class="notebook-layout">
      <section class="notebook-left">
        <div class="notebook-header">
          <div class="notebook-header-top">
            <h1 id="notebook-title">Sổ tay của bạn</h1>
          </div>

          <div id="notebook-grid" class="notebook-grid" aria-live="polite">
            <!-- notebook cards injected here -->
          </div>
        </div>

        <div id="notebook-detail" class="notebook-detail hidden">
          <div class="notebook-detail-head">
            <h2 id="selected-notebook-title"></h2>
            <button id="start-review-btn" class="btn-primary">Ôn tập</button>
            <input id="search-input" placeholder="Tìm kiếm từ..." />
          </div>
          <div class="vocab-list" id="vocab-list" aria-live="polite">
            <!-- vocab cards injected here -->
          </div>
        </div>
      </section>

      <aside class="notebook-right">
        <div class="sr-card">
          <h2>Spaced Repetition</h2>

          <div id="sr-summary">
            <div id="sr-item-now" class="sr-item" role="button" tabindex="0">
              <span>Ôn tập ngay</span>
              <strong id="sr-now">0</strong>
            </div>
            <div id="sr-item-1" class="sr-item" role="button" tabindex="0">
              <span>Ngày mai</span>
              <strong id="sr-1">0</strong>
            </div>
            <div id="sr-item-3" class="sr-item" role="button" tabindex="0">
              <span>3 ngày</span>
              <strong id="sr-3">0</strong>
            </div>
            <div id="sr-item-7" class="sr-item" role="button" tabindex="0">
              <span>7 ngày</span>
              <strong id="sr-7">0</strong>
            </div>
            <div id="sr-item-14" class="sr-item" role="button" tabindex="0">
              <span>14 ngày</span>
              <strong id="sr-14">0</strong>
            </div>
            <div id="sr-item-mastered" class="sr-item" role="button" tabindex="0">
              <span>Nhớ sâu</span>
              <strong id="sr-mastered">0</strong>
            </div>
          </div>

          <button id="review-now-btn" class="btn-primary full-width">Ôn tập hôm nay</button>
        </div>
      </aside>
    </main>
  </div>

  <!-- review modal simple -->
  <div id="review-modal" class="auth-modal hidden" aria-hidden="true">
    <div class="auth-modal-card" style="max-width:680px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 id="review-title">Ôn tập từ vựng</h3>
        <button id="close-review" class="icon-btn">x</button>
      </div>
      <div id="review-progress" style="margin-bottom:10px;color:var(--text-soft);font-size:13px;"></div>

      <div id="review-card" style="padding:16px;border-radius:12px;border:1px solid var(--line);background:rgba(7,19,41,0.7);min-height:140px;cursor:pointer;">
        <div id="review-word" style="font-size:28px;font-weight:700;line-height:1.2;"></div>
        <div id="review-phonetic" style="color:var(--accent)"></div>
        <div id="review-meaning" style="margin-top:10px;color:var(--text-soft)"></div>
      </div>
      <div id="review-hint" style="margin-top:8px;font-size:12px;color:var(--text-soft);">Bấm để xem nghĩa</div>

      <div id="review-actions" class="hidden" style="display:flex;gap:12px;margin-top:16px;">
        <div style="flex:1"></div>
        <button id="btn-wrong" class="btn-outline">Chưa thuộc</button>
        <button id="btn-correct" class="btn-primary">Đã thuộc</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="auth-modal hidden" aria-hidden="true">
    <div class="auth-modal-card settings-modal-card">
      <div class="auth-modal-head">
        <h3>Cài đặt giao diện</h3>
        <button id="close-settings-modal" class="icon-btn" type="button" aria-label="Đóng">x</button>
      </div>
      <div class="settings-body">
        <p class="settings-label">Chế độ màu</p>
        <div id="theme-segmented" class="theme-segmented" role="group" aria-label="Chọn chế độ màu">
          <button class="theme-option" type="button" data-theme-mode="light" aria-pressed="false">Light</button>
          <button class="theme-option" type="button" data-theme-mode="dark" aria-pressed="false">Dark</button>
          <button class="theme-option" type="button" data-theme-mode="system" aria-pressed="false">System</button>
        </div>
      </div>
    </div>
  </div>

  <!-- reuse auth modal -->
  <div id="auth-modal" class="auth-modal hidden" aria-hidden="true">
    <div class="auth-modal-card">
      <div class="auth-modal-head">
        <h3 id="auth-title">Đăng nhập</h3>
        <button id="close-auth-modal" class="icon-btn" type="button" aria-label="Đóng">x</button>
      </div>
      <form id="auth-form" class="auth-form">
        <label id="auth-username-label" for="auth-username" class="hidden">Username</label>
        <input id="auth-username" name="username" type="text" minlength="3" maxlength="30" class="hidden" />
        <label for="auth-email">Email</label>
        <input id="auth-email" name="email" type="email" required />
        <label for="auth-password">Mật khẩu</label>
        <input id="auth-password" name="password" type="password" minlength="8" required />
        <p id="auth-status" class="auth-status"></p>
        <button id="auth-submit" class="btn-primary auth-submit" type="submit">Đăng nhập</button>
      </form>
      <button id="switch-auth-mode" class="auth-switch" type="button"></button>
    </div>
  </div>

  <script src="../script.js"></script>
  <script src="./main.js"></script>
</body>
</html>
